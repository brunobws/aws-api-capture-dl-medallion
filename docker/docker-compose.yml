x-airflow-common: &airflow-common
  image: apache/airflow:2.10.3
  environment:
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AWS_DEFAULT_REGION: sa-east-1


    # PERFORMANCE TUNING (LOW MEMORY)
    AIRFLOW__WEBSERVER__WORKERS: 1
    AIRFLOW__SCHEDULER__MAX_THREADS: 1
    AIRFLOW__CORE__PARALLELISM: 2
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1

    _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-amazon

  volumes:
    - ../dags:/opt/airflow/dags
    - ../logs:/opt/airflow/logs
    - ../plugins:/opt/airflow/plugins
    - ~/.aws:/home/airflow/.aws:ro

  user: "${AIRFLOW_UID:-50000}:0"

  depends_on:
    - postgres

services:

  postgres:
    image: postgres:13
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    restart: always

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always

  streamlit:
    build: ../streamlit_app
    container_name: streamlit_dashboard
    command: streamlit run main.py --server.headless true --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ../streamlit_app:/app
    restart: always

volumes:
  postgres-db-volume:
